<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create your SharpCuts account to book haircuts, manage appointments, and enjoy premium grooming services online.">
  <title>Create Account - SharpCuts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon">✂️</div>
        <div class="logo-text">Sharp<span>Cuts</span></div>
      </a>

      <div class="navbar-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#why-us">About</a>
        <a href="index.html#contact">Contact</a>
      </div>

      <div class="navbar-actions" id="navActions">
        <a href="login.html" class="btn btn-ghost">Sign In</a>
        <a href="register.html" class="btn btn-primary" style="box-shadow: var(--shadow-gold-lg);">Book Now</a>
      </div>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Register Section -->
  <section class="auth-page">
    <div class="auth-container">
      <!-- Header -->
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">✂️</div>
          <div class="logo-text">Sharp<span>Cuts</span></div>
        </a>
        <h1>Create Account</h1>
        <p>Join SharpCuts and book your first appointment today</p>
      </div>

      <!-- Register Card -->
      <div class="auth-card">
        <!-- Message -->
        <div class="form-message" id="formMessage">
          <span class="message-icon"></span>
          <span class="message-text"></span>
        </div>

        <form id="registerForm" novalidate>
          <!-- Name Row -->
          <div class="form-row">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <div class="form-input-wrapper">
                <input 
                  type="text" 
                  id="fullName" 
                  class="form-input" 
                  placeholder="John Doe"
                  required
                >
                <span class="input-icon">👤</span>
              </div>
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <div class="form-input-wrapper">
                <input 
                  type="tel" 
                  id="phone" 
                  class="form-input" 
                  placeholder="+1 (555) 123-4567"
                  required
                >
                <span class="input-icon">📱</span>
              </div>
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="form-input-wrapper">
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="you@example.com"
                required
              >
              <span class="input-icon">📧</span>
            </div>
          </div>

          <!-- Role -->
          <div class="form-group">
            <label for="role">I am a</label>
            <div class="form-input-wrapper">
              <select id="role" class="form-select" required>
                <option value="customer">Customer - Book Appointments</option>
                <option value="barber">Barber - Offer Services</option>
              </select>
              <span class="input-icon">🎯</span>
            </div>
          </div>

          <!-- Password Row -->
          <div class="form-row">
            <div class="form-group">
              <label for="password">Password</label>
              <div class="form-input-wrapper">
                <input 
                  type="password" 
                  id="password" 
                  class="form-input" 
                  placeholder="Min 6 characters"
                  required
                  minlength="6"
                >
                <span class="input-icon">🔒</span>
                <span class="password-toggle" data-target="password">👁️</span>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="form-input-wrapper">
                <input 
                  type="password" 
                  id="confirmPassword" 
                  class="form-input" 
                  placeholder="Repeat password"
                  required
                >
                <span class="input-icon">🔐</span>
                <span class="password-toggle" data-target="confirmPassword">👁️</span>
              </div>
            </div>
          </div>

          <!-- Terms -->
          <div class="form-group">
            <div class="checkbox-wrapper">
              <input type="checkbox" id="terms" required>
              <label for="terms">I agree to the <a href="#" style="color: var(--color-gold);">Terms of Service</a> and <a href="#" style="color: var(--color-gold);">Privacy Policy</a></label>
            </div>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="spinner"></span>
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">or sign up with</div>

        <!-- Social Login -->
        <div class="social-buttons">
          <button class="btn-social" type="button">
            🔵 Google
          </button>
          <button class="btn-social" type="button">
            ⚫ Apple
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
