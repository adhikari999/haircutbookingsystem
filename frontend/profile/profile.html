<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - EasyCut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body class="dashboard-body">

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-logo">
        <div class="logo-icon"><img src="../assets/logo.png" alt="EasyCut"></div>
        <div class="logo-text">Easy<span>Cut</span></div>
      </a>

      <div class="navbar-links" id="navLinks">
        <a href="../index.html">Home</a>
        <a href="../hairstyles.html">Styles</a>
        <a href="../index.html#services">Services</a>
        <a href="../index.html#why-us">About</a>
        <a href="../index.html#contact">Contact</a>
      </div>

      <div class="navbar-actions" id="navActions">
        <a href="profile.html" class="btn btn-ghost" style="color: var(--color-gold);">
            <i class="bi bi-person-badge me-1"></i> Profile
        </a>
        <button class="btn btn-outline" onclick="handleLogout()">
            <i class="bi bi-box-arrow-right me-1"></i> Logout
        </button>
      </div>

      <div class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <main class="luxury-dashboard">
    
    <header class="dash-header">
      <h1 id="profileName">Loading...</h1>
      <div class="dash-subtitle">
        <span id="profileRole">VALUED CLIENT</span> &bull; SINCE <span id="memberSince">...</span>
      </div>
    </header>

    <div class="dash-stats">
      <div class="stat-card">
        <i class="bi bi-calendar"></i>
        <div class="stat-num" id="statBookings">0</div>
        <div class="stat-label">BOOKINGS</div>
      </div>
      <div class="stat-card">
        <i class="bi bi-check-circle"></i>
        <div class="stat-num" id="statCompleted">0</div>
        <div class="stat-label">COMPLETED</div>
      </div>
    </div>

    <section class="dash-section">
      <div class="section-top">
        <h2>Active Ritual</h2>
        <a href="#" class="view-all">VIEW ALL</a>
      </div>
      
      <div id="bookingsList" class="ritual-list">
        <!-- Rendered by JS -->
      </div>
    </section>

    <section class="dash-section">
      <h2 class="quick-title">QUICK ACTIONS</h2>
      <div class="action-grid">
        <a href="../index.html#services" class="action-box gold-box">
          <i class="bi bi-scissors"></i>
          <span>BOOK APPOINTMENT</span>
        </a>
        <a href="../hairstyles.html" class="action-box dark-box">
          <i class="bi bi-grid"></i>
          <span>BROWSE SERVICES</span>
        </a>
        <a href="../index.html#contact" class="action-box dark-box">
          <i class="bi bi-chat-fill"></i>
          <span>CONTACT SUPPORT</span>
        </a>
        <a href="../index.html" class="action-box dark-box">
          <i class="bi bi-house-door-fill"></i>
          <span>BACK TO HOME</span>
        </a>
      </div>
    </section>

    <button class="btn-signout" onclick="handleLogout()">
      <i class="bi bi-box-arrow-right"></i> SIGN OUT
    </button>

    <div class="dash-footer">
      THE HEIRLOOM LUXURY GROOMING &bull; V2.4.0
    </div>

  </main>

  <script src="../js/main.js"></script>
  <script src="profile.js"></script>
  <script>
    const API_BASE_URL = 'http://localhost:5000/api';
  </script>
</body>
</html>
