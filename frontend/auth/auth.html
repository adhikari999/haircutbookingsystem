<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in or create a EasyCut account to manage your premium grooming bookings.">
  <title>Authentication - EasyCut</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="auth.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="../index.html" class="navbar-logo">
        <div class="logo-icon" style="display: flex; align-items: center; justify-content: center;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle><line x1="20" y1="4" x2="8.12" y2="15.88"></line><line x1="14.47" y1="14.48" x2="20" y2="20"></line><line x1="8.12" y1="8.12" x2="12" y2="12"></line>
          </svg>
        </div>
        <div class="logo-text" style="font-weight: 800; font-size: 1.6rem; letter-spacing: 1px; color: white; margin-left: 8px;">Easy<span style="color: var(--color-gold);">Cut</span></div>
      </a>

      <div class="navbar-links" id="navLinks">
        <a href="../index.html">Home</a>
        <a href="../hairstyles.html">Styles</a>
        <a href="../index.html#services">Services</a>
        <a href="../index.html#why-us">About</a>
        <a href="../index.html#contact">Contact</a>
      </div>

      <div class="navbar-actions" id="navActions">
        <a href="../index.html" class="btn btn-ghost">Home</a>
      </div>
    </div>
  </nav>

  <!-- Auth Section -->
  <section class="auth-section">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="register">New Account</button>
        <div class="tab-slider"></div>
      </div>

      <!-- Message Center -->
      <div class="form-message" id="formMessage">
        <span class="message-text"></span>
      </div>

      <!-- Login Form Content -->
      <div class="auth-content active" id="loginContent">
        <div class="auth-header">
          <h1>Welcome Back</h1>
          <p>Sign in to manage your appointments</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="loginEmail" class="form-input" placeholder="you@example.com" required>
              <span class="input-icon"></span>
            </div>
          </div>
          <div class="form-group">
            <label>Password</label>
            <div class="input-wrapper">
              <input type="password" id="loginPassword" class="form-input" placeholder="Password" required>
              <span class="input-icon"></span>
              <span class="password-toggle" onclick="togglePass('loginPassword', this)">Show</span>
            </div>
          </div>
          <div class="form-options">
            <label class="checkbox-wrapper">
              <input type="checkbox"> <span>Remember me</span>
            </label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>

      <!-- Register Form Content -->
      <div class="auth-content" id="registerContent">
        <div class="auth-header">
          <h1>Create Account</h1>
          <p>Join our premium grooming community</p>
        </div>

        <form id="registerForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label>Full Name</label>
              <div class="input-wrapper">
                <input type="text" id="regName" class="form-input" placeholder="Enter your name" required>
                <span class="input-icon"></span>
              </div>
            </div>
            <div class="form-group">
              <label>Phone</label>
              <div class="input-wrapper">
                <input type="tel" id="regPhone" class="form-input" placeholder="+1..." required>
                <span class="input-icon"></span>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="regEmail" class="form-input" placeholder="name@email.com" required>
              <span class="input-icon"></span>
            </div>
          </div>
          <div class="form-group">
            <label>I am a</label>
            <div class="input-wrapper">
              <select id="regRole" class="form-select">
                <option value="customer">Customer (I want a cut)</option>
                <option value="barber">Barber (I provide cuts)</option>
              </select>
              <span class="input-icon"></span>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Password</label>
              <div class="input-wrapper">
                <input type="password" id="regPassword" class="form-input" placeholder="Min 6 chars" required>
                <span class="input-icon"></span>
              </div>
            </div>
            <div class="form-group">
              <label>Confirm</label>
              <div class="input-wrapper">
                <input type="password" id="regConfirmPassword" class="form-input" placeholder="Repeat" required>
                <span class="input-icon"></span>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
            <span class="btn-text">Create Account</span>
            <span class="spinner"></span>
          </button>
        </form>
      </div>


    </div>
  </section>

  <script src="../js/main.js"></script>
  <script src="auth_portal.js"></script>
</body>

</html>
