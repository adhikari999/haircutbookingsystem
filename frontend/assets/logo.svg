<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="44" height="44">
  <!-- Outer circle border (double ring effect) -->
  <circle cx="50" cy="50" r="48" fill="white" stroke="black" stroke-width="2.5"/>
  <circle cx="50" cy="50" r="43" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Scissors: crossed blades -->
  <!-- Top-left blade going to center-right -->
  <line x1="18" y1="20" x2="54" y2="58" stroke="black" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Bottom-left blade going to center-right -->
  <line x1="18" y1="58" x2="54" y2="20" stroke="black" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Top handle ring -->
  <circle cx="16" cy="18" r="8" fill="white" stroke="black" stroke-width="4"/>
  <!-- Bottom handle ring -->
  <circle cx="16" cy="60" r="8" fill="white" stroke="black" stroke-width="4"/>

  <!-- Pivot screw -->
  <circle cx="36" cy="39" r="3" fill="black"/>

  <!-- Comb body -->
  <rect x="54" y="20" width="26" height="42" rx="3" fill="black"/>
  <!-- Comb teeth gaps (white slots) -->
  <rect x="41" y="24" width="14" height="6" rx="1" fill="white"/>
  <rect x="41" y="34" width="14" height="6" rx="1" fill="white"/>
  <rect x="41" y="44" width="14" height="6" rx="1" fill="white"/>
  <rect x="41" y="54" width="14" height="5" rx="1" fill="white"/>
</svg>
