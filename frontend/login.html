<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to your SharpCuts account to manage bookings, view appointments, and access premium grooming services.">
  <title>Sign In - SharpCuts</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="index.html" class="navbar-logo">
        <div class="logo-icon">✂️</div>
        <div class="logo-text">Sharp<span>Cuts</span></div>
      </a>

      <div class="navbar-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#why-us">About</a>
        <a href="index.html#contact">Contact</a>
      </div>

      <div class="navbar-actions" id="navActions">
        <a href="login.html" class="btn btn-ghost" style="color: var(--color-gold);">Sign In</a>
        <a href="register.html" class="btn btn-primary">Book Now</a>
      </div>

      <div class="hamburger" id="hamburger">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- Login Section -->
  <section class="auth-page">
    <div class="auth-container">
      <!-- Header -->
      <div class="auth-header">
        <a href="index.html" class="auth-logo">
          <div class="logo-icon">✂️</div>
          <div class="logo-text">Sharp<span>Cuts</span></div>
        </a>
        <h1>Welcome Back</h1>
        <p>Sign in to manage your appointments and bookings</p>
      </div>

      <!-- Login Card -->
      <div class="auth-card">
        <!-- Message -->
        <div class="form-message" id="formMessage">
          <span class="message-icon"></span>
          <span class="message-text"></span>
        </div>

        <form id="loginForm" novalidate>
          <!-- Email -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="form-input-wrapper">
              <input 
                type="email" 
                id="email" 
                class="form-input" 
                placeholder="Enter your email"
                required
              >
              <span class="input-icon">📧</span>
            </div>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="form-input-wrapper">
              <input 
                type="password" 
                id="password" 
                class="form-input" 
                placeholder="Enter your password"
                required
              >
              <span class="input-icon">🔒</span>
              <span class="password-toggle" id="togglePassword">👁️</span>
            </div>
          </div>

          <!-- Remember & Forgot -->
          <div class="form-options">
            <div class="checkbox-wrapper">
              <input type="checkbox" id="remember">
              <label for="remember">Remember me</label>
            </div>
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
            <span class="btn-text">Sign In</span>
            <span class="spinner"></span>
          </button>
        </form>

        <!-- Divider -->
        <div class="auth-divider">or continue with</div>

        <!-- Social Login -->
        <div class="social-buttons">
          <button class="btn-social" type="button">
            🔵 Google
          </button>
          <button class="btn-social" type="button">
            ⚫ Apple
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Create one free</a></p>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
